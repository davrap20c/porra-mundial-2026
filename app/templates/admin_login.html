{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card">
      <div class="card-body p-4 text-center">
        <i class="bi bi-gear-fill fs-1 text-warning mb-3 d-block"></i>
        <h4 class="fw-bold mb-4">Panel de Administración</h4>
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3 text-start">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" autofocus required>
          </div>
          <button type="submit" class="btn btn-warning w-100 fw-bold">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
